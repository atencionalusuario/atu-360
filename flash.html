<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<base href="/atu-360/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATU 360 — Flash Informativos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #F8FAFC; display: flex; min-height: 100vh; color: #1E293B; }
  .sidebar { width: 220px; flex-shrink: 0; background: #0F2070; display: flex; flex-direction: column; min-height: 100vh; }
  .sb-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sb-name { font-size: 1.25rem; font-weight: 800; color: white; }
  .sb-name span { color: #29ABE2; }
  .sb-tagline { font-size: 0.62rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
  .sb-nav { padding: 20px 12px; flex: 1; }
  .nav-section-label { font-size: 0.58rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; padding: 0 10px; margin: 16px 0 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; font-size: 0.8rem; color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.15s; margin-bottom: 1px; position: relative; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
  .nav-item.active { background: rgba(41,171,226,0.15); color: white; font-weight: 600; border-left: 2px solid #29ABE2; }
  .nav-badge { background: #EF4444; color: white; font-size: 0.58rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: auto; }
  .sb-bottom { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
  .sb-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1A3DAA; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; color: white; font-weight: 700; flex-shrink: 0; border: 1.5px solid rgba(41,171,226,0.4); }
  .sb-user-name { font-size: 0.76rem; font-weight: 600; color: white; }
  .sb-user-role { font-size: 0.62rem; color: rgba(255,255,255,0.4); margin-top: 1px; }
  .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: rgba(255,255,255,0.5); font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-logout:hover { background: rgba(255,255,255,0.1); color: white; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
  .topbar { background: white; padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .topbar-left h2 { font-size: 0.9rem; font-weight: 600; color: #1E293B; }
  .topbar-sep { color: #CBD5E1; }
  .topbar-left p { font-size: 0.78rem; color: #94A3B8; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .tb-clock { font-size: 1rem; font-weight: 700; color: #1A3DAA; font-variant-numeric: tabular-nums; }
  .content { padding: 24px 28px; display: flex; gap: 24px; align-items: flex-start; }
  .posts-col { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .section-title { font-size: 0.72rem; font-weight: 600; color: #94A3B8; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .post-card { background: white; border-radius: 10px; border: 1px solid #E2E8F0; cursor: pointer; transition: all 0.15s; overflow: hidden; }
  .post-card:hover { border-color: #CBD5E1; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .post-card.active { border-color: #1A3DAA; box-shadow: 0 2px 12px rgba(26,61,170,0.1); }
  .post-card.leido { opacity: 0.65; }
  .post-card-inner { padding: 16px 18px; display: flex; gap: 12px; align-items: flex-start; }
  .post-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #1A3DAA; flex-shrink: 0; margin-top: 5px; }
  .post-unread-dot.hidden { visibility: hidden; }
  .post-meta { flex: 1; }
  .post-cat { display: inline-block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; margin-bottom: 5px; }
  .post-cat.actualizacion { background: #EEF2FF; color: #1A3DAA; }
  .post-cat.noticia       { background: #F0FDF4; color: #16A34A; }
  .post-cat.cambio        { background: #FFFBEB; color: #B45309; }
  .post-cat.urgente       { background: #FEF2F2; color: #DC2626; }
  .post-title { font-size: 0.85rem; font-weight: 700; color: #1E293B; line-height: 1.4; }
  .post-excerpt { font-size: 0.75rem; color: #64748B; margin-top: 4px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .post-date { font-size: 0.68rem; color: #94A3B8; }
  .post-leido-badge { font-size: 0.65rem; font-weight: 600; color: #16A34A; display: flex; align-items: center; gap: 4px; }
  .detail-col { width: 480px; flex-shrink: 0; position: sticky; top: 80px; }
  .detail-empty { background: white; border-radius: 10px; border: 1px solid #E2E8F0; padding: 48px 24px; text-align: center; }
  .detail-empty p { font-size: 0.82rem; color: #94A3B8; margin-top: 12px; }
  .detail-card { background: white; border-radius: 10px; border: 1px solid #E2E8F0; overflow: hidden; display: none; }
  .detail-card.show { display: block; }
  .detail-header { padding: 24px 28px 20px; border-bottom: 1px solid #F1F5F9; }
  .detail-cat { display: inline-block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; margin-bottom: 10px; }
  .detail-title { font-size: 1.1rem; font-weight: 800; color: #1E293B; line-height: 1.4; }
  .detail-byline { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .detail-author-av { width: 28px; height: 28px; border-radius: 50%; background: #1A3DAA; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: white; font-weight: 700; flex-shrink: 0; }
  .detail-author-name { font-size: 0.75rem; font-weight: 600; color: #374151; }
  .detail-author-date { font-size: 0.68rem; color: #94A3B8; }
  .detail-body { padding: 24px 28px; font-size: 0.85rem; color: #374151; line-height: 1.8; white-space: pre-wrap; }
  .detail-footer { padding: 20px 28px; border-top: 1px solid #F1F5F9; display: flex; align-items: center; justify-content: space-between; }
  .leido-status { font-size: 0.75rem; color: #94A3B8; display: flex; align-items: center; gap: 6px; }
  .leido-status.done { color: #16A34A; font-weight: 600; }
  .leido-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid #CBD5E1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .leido-check.done { background: #16A34A; border-color: #16A34A; }
  .btn-marcar { padding: 10px 20px; background: #1A3DAA; color: white; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.15s; display: flex; align-items: center; gap: 8px; }
  .btn-marcar:hover { opacity: 0.88; }
  .btn-marcar.done { background: #F0FDF4; color: #16A34A; cursor: default; border: 1px solid #BBF7D0; }
  .btn-marcar.done:hover { opacity: 1; }
  .loading { text-align: center; padding: 32px; font-size: 0.8rem; color: #94A3B8; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #E2E8F0; border-top-color: #1A3DAA; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-name">ATU <span>360</span></div>
    <div class="sb-tagline">by DoctorSV</div>
  </div>
  <div class="sb-nav">
    <div class="nav-section-label">Principal</div>
    <div class="nav-item" onclick="window.location.href='home.html'">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Inicio
    </div>
    <div class="nav-item active">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 000-4H4v4z"/><path d="M18 18V2H6a2 2 0 00-2 2v14"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="13" y2="11"/></svg>
      Flash Informativos
      <span class="nav-badge" id="navBadge" style="display:none">0</span>
    </div>
    <div class="nav-item">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Mi Turno
    </div>
    <div class="nav-section-label">Reportes</div>
    <div class="nav-item">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Mis Métricas
    </div>
  </div>
  <div class="sb-bottom">
    <div class="sb-user">
      <div class="sb-avatar" id="sbAvatar">--</div>
      <div>
        <div class="sb-user-name" id="sbName">Cargando...</div>
        <div class="sb-user-role">Agente</div>
      </div>
    </div>
    <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Flash Informativos</h2>
      <span class="topbar-sep">/</span>
      <p id="sinLeerLabel">Cargando...</p>
    </div>
    <div class="topbar-right">
      <div class="tb-clock" id="clock">--:--:--</div>
    </div>
  </div>

  <div class="content">
    <div class="posts-col">
      <div class="section-title">Publicaciones recientes</div>
      <div id="postsList"><div class="loading"><div class="spinner"></div><br>Cargando publicaciones...</div></div>
    </div>
    <div class="detail-col">
      <div class="detail-empty" id="detailEmpty">
        <svg width="40" height="40" fill="none" stroke="#CBD5E1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 000-4H4v4z"/><path d="M18 18V2H6a2 2 0 00-2 2v14"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="13" y2="11"/></svg>
        <p>Selecciona una publicación<br>para leer su contenido</p>
      </div>
      <div class="detail-card" id="detailCard"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:            "AIzaSyD7QOy_Iv9-AxWmReQOfNCwLaFkEyZakM8",
    authDomain:        "atu-360.firebaseapp.com",
    projectId:         "atu-360",
    storageBucket:     "atu-360.firebasestorage.app",
    messagingSenderId: "820106715923",
    appId:             "1:820106715923:web:9c58af48af1dce06ac30e6"
  });
  var auth = firebase.auth();
  var db   = firebase.firestore();

  var currentUser = null;
  var posts = [];
  var misLecturas = {}; // postId → true
  var postActivo = null;

  var CATS = { actualizacion:'Actualización', noticia:'Noticia', cambio:'Cambio', urgente:'Urgente' };

  setInterval(function(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-SV'); }, 1000);
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-SV');

  // Auth
  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = 'login.html'; return; }
    currentUser = user;
    var name = user.email.split('@')[0];
    document.getElementById('sbName').textContent    = name;
    document.getElementById('sbAvatar').textContent  = name.substring(0,2).toUpperCase();
    cargarMisLecturas();
  });

  document.getElementById('btnLogout').addEventListener('click', function(){
    auth.signOut().then(function(){ window.location.href = 'login.html'; });
  });

  // 1. Cargar mis lecturas primero
  function cargarMisLecturas() {
    db.collection('flash_lecturas')
      .where('uid', '==', currentUser.uid)
      .get()
      .then(function(snap) {
        snap.forEach(function(doc) { misLecturas[doc.data().postId] = true; });
        cargarPosts();
      });
  }

  // 2. Cargar posts publicados en tiempo real
  function cargarPosts() {
    db.collection('flash_posts')
      .where('estado', '==', 'publicado')
      .orderBy('fechaCreacion', 'desc')
      .onSnapshot(function(snap) {
        posts = [];
        snap.forEach(function(doc) {
          posts.push(Object.assign({ id: doc.id }, doc.data()));
        });
        renderPosts();
      });
  }

  function renderPosts() {
    var sinLeer = posts.filter(function(p){ return !misLecturas[p.id]; }).length;
    document.getElementById('sinLeerLabel').textContent = sinLeer > 0 ? sinLeer + ' sin leer' : 'Todo al día';
    var badge = document.getElementById('navBadge');
    badge.textContent = sinLeer;
    badge.style.display = sinLeer > 0 ? 'inline' : 'none';

    if (posts.length === 0) {
      document.getElementById('postsList').innerHTML = '<div class="loading">No hay publicaciones disponibles.</div>';
      return;
    }

    var html = '';
    posts.forEach(function(p) {
      var leido = !!misLecturas[p.id];
      var fecha = p.fechaCreacion ? new Date(p.fechaCreacion.seconds*1000).toLocaleDateString('es-SV') : '';
      html += '<div class="post-card'+(leido?' leido':'')+(postActivo===p.id?' active':'')+'" onclick="abrirPost(\''+p.id+'\')">'
        +'<div class="post-card-inner">'
        +'<div class="post-unread-dot'+(leido?' hidden':'')+'"></div>'
        +'<div class="post-meta">'
        +'<span class="post-cat '+p.categoria+'">'+CATS[p.categoria]+'</span>'
        +'<div class="post-title">'+p.titulo+'</div>'
        +'<div class="post-excerpt">'+p.contenido.substring(0,120)+'...</div>'
        +'<div class="post-footer">'
        +'<span class="post-date">'+fecha+' · '+(p.autorNombre||'')+'</span>'
        +(leido?'<span class="post-leido-badge"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Leído</span>':'')
        +'</div></div></div></div>';
    });
    document.getElementById('postsList').innerHTML = html;
  }

  function abrirPost(id) {
    postActivo = id;
    var p = posts.find(function(x){ return x.id===id; });
    if (!p) return;
    document.querySelectorAll('.post-card').forEach(function(c){ c.classList.remove('active'); });
    var card = document.querySelector('[onclick="abrirPost(\''+id+'\')"]');
    if (card) card.classList.add('active');

    var leido = !!misLecturas[id];
    var fecha = p.fechaCreacion ? new Date(p.fechaCreacion.seconds*1000).toLocaleDateString('es-SV') : '';
    var iniciales = p.autorNombre ? p.autorNombre.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase() : '--';

    document.getElementById('detailEmpty').style.display = 'none';
    var dc = document.getElementById('detailCard');
    dc.className = 'detail-card show';
    dc.innerHTML =
      '<div class="detail-header">'
      +'<span class="detail-cat '+p.categoria+'">'+CATS[p.categoria]+'</span>'
      +'<div class="detail-title">'+p.titulo+'</div>'
      +'<div class="detail-byline">'
      +'<div class="detail-author-av">'+iniciales+'</div>'
      +'<div><div class="detail-author-name">'+(p.autorNombre||'')+'</div>'
      +'<div class="detail-author-date">'+fecha+'</div></div>'
      +'</div></div>'
      +'<div class="detail-body">'+p.contenido+'</div>'
      +'<div class="detail-footer">'
      +'<div class="leido-status'+(leido?' done':'')+'">'
      +'<div class="leido-check'+(leido?' done':'')+'">'+
        (leido?'<svg width="10" height="10" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'')
      +'</div>'
      +(leido ? 'Leído' : 'Pendiente de lectura')
      +'</div>'
      +'<button class="btn-marcar'+(leido?' done':'')+'" id="btnMarcar" '+(leido?'disabled':'')+' onclick="marcarLeido(\''+id+'\')">'
      +(leido
        ? '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Ya leído'
        : 'Marcar como leído')
      +'</button></div>';
  }

  function marcarLeido(id) {
    if (!currentUser || misLecturas[id]) return;
    db.collection('flash_lecturas').add({
      postId:      id,
      uid:         currentUser.uid,
      email:       currentUser.email,
      nombre:      currentUser.email.split('@')[0],
      timestamp:   firebase.firestore.FieldValue.serverTimestamp()
    }).then(function() {
      misLecturas[id] = true;
      renderPosts();
      abrirPost(id);
    }).catch(function(e){ console.error('Error guardando lectura:', e); });
  }
</script>
</body>
</html>

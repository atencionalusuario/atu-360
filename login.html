<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATU 360 — Iniciar sesión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #F8FAFC; min-height: 100vh; display: flex; }
  .left { width: 52%; background: linear-gradient(145deg, #142D8A 0%, #1A3DAA 50%, #29ABE2 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; position: relative; overflow: hidden; }
  .left::before { content:''; position:absolute; width:400px; height:400px; border-radius:50%; background:rgba(255,255,255,0.05); top:-100px; left:-100px; }
  .left::after  { content:''; position:absolute; width:300px; height:300px; border-radius:50%; background:rgba(255,255,255,0.05); bottom:-80px; right:-80px; }
  .brand { text-align:center; z-index:1; }
  .brand-name { font-size:2.2rem; font-weight:800; color:white; letter-spacing:1px; }
  .brand-name span { color:#29ABE2; }
  .brand-sub { font-size:0.85rem; color:rgba(255,255,255,0.65); margin-top:6px; letter-spacing:3px; text-transform:uppercase; }
  .right { width:48%; display:flex; align-items:center; justify-content:center; padding:48px; }
  .card { background:white; border-radius:20px; padding:40px 36px; width:100%; max-width:400px; box-shadow:0 4px 32px rgba(26,61,170,0.08); border:1px solid #E2E8F0; }
  .card-title { font-size:1.5rem; font-weight:800; color:#1E293B; }
  .card-sub { font-size:0.82rem; color:#64748B; margin-top:4px; margin-bottom:28px; }
  .field { margin-bottom:18px; }
  label { display:block; font-size:0.78rem; font-weight:600; color:#374151; margin-bottom:6px; }
  .input-wrap { position:relative; }
  .input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1rem; color:#94a3b8; }
  input[type="email"], input[type="password"] { width:100%; padding:12px 14px 12px 40px; border:1.5px solid #E2E8F0; border-radius:10px; font-size:0.88rem; color:#1E293B; background:#F8FAFC; outline:none; transition:border 0.2s; font-family:inherit; }
  input:focus { border-color:#1A3DAA; box-shadow:0 0 0 3px rgba(26,61,170,0.08); background:white; }
  .show-pass { position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:0.85rem; color:#64748B; user-select:none; }
  .forgot { text-align:right; margin-top:-10px; margin-bottom:20px; }
  .forgot a { font-size:0.75rem; color:#1A3DAA; text-decoration:none; font-weight:600; }
  .error-msg { background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; padding:10px 14px; font-size:0.78rem; color:#DC2626; margin-bottom:16px; display:none; }
  .error-msg.show { display:block; }
  .btn-login { width:100%; padding:13px; background:linear-gradient(135deg,#1A3DAA,#29ABE2); color:white; border:none; border-radius:10px; font-size:0.92rem; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(26,61,170,0.25); transition:opacity 0.2s; font-family:inherit; }
  .btn-login:hover { opacity:0.92; }
  .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
  .footer-note { text-align:center; margin-top:24px; font-size:0.7rem; color:#94A3B8; }
  .footer-note strong { color:#1A3DAA; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="left">
  <div class="brand">
    <div class="brand-name">ATU <span>360</span></div>
    <div class="brand-sub">by DoctorSV</div>
  </div>
</div>

<div class="right">
  <div class="card">
    <div class="card-title">Bienvenido/a</div>
    <div class="card-sub">Inicia sesión para acceder a tu panel</div>
    <div class="error-msg" id="errMsg"></div>
    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" placeholder="usuario@doctorsv.com" />
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="pass" placeholder="••••••••" />
        <span class="show-pass" id="togglePass">👁️</span>
      </div>
    </div>
    <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div>
    <button class="btn-login" id="btnLogin">Iniciar sesión</button>
    <div class="footer-note">Sistema exclusivo para personal de <strong>DoctorSV</strong><br>¿Problemas para acceder? Contacta a tu administrador</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:            "AIzaSyD7QOy_Iv9-AxWmReQOfNCwLaFkEyZakM8",
    authDomain:        "atu-360.firebaseapp.com",
    projectId:         "atu-360",
    storageBucket:     "atu-360.firebasestorage.app",
    messagingSenderId: "820106715923",
    appId:             "1:820106715923:web:9c58af48af1dce06ac30e6"
  });
  var auth = firebase.auth();
  var db   = firebase.firestore();

  // Mapa de redirección por rol
  var RUTAS = {
    agente:  'home.html',
    editor:  'editor.html',
    admin:   'admin.html'
  };

  document.getElementById('togglePass').addEventListener('click', function(){
    var p = document.getElementById('pass');
    p.type = p.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('pass').addEventListener('keydown', function(e){
    if (e.key === 'Enter') doLogin();
  });

  document.getElementById('btnLogin').addEventListener('click', doLogin);

  function doLogin() {
    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('pass').value;
    var err   = document.getElementById('errMsg');
    var btn   = document.getElementById('btnLogin');
    err.classList.remove('show');

    if (!email || !pass) {
      err.textContent = 'Por favor completa todos los campos.';
      err.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ingresando...';

    auth.signInWithEmailAndPassword(email, pass)
      .then(function(cred) {
        var uid = cred.user.uid;
        // Leer rol desde Firestore
        return db.collection('usuarios').doc(uid).get();
      })
      .then(function(doc) {
        if (!doc.exists) {
          throw { code: 'auth/no-profile', message: 'No se encontró el perfil del usuario.' };
        }
        var rol  = doc.data().rol;
        var ruta = RUTAS[rol];
        if (!ruta) {
          throw { code: 'auth/unknown-role', message: 'Rol no reconocido: ' + rol };
        }
        // Guardar datos de sesión
        sessionStorage.setItem('atu_rol',    rol);
        sessionStorage.setItem('atu_nombre', doc.data().nombre || '');
        // Redirigir según rol
        window.location.href = ruta;
      })
      .catch(function(e) {
        var msg = 'Correo o contraseña incorrectos.';
        if (e.code === 'auth/too-many-requests')  msg = 'Demasiados intentos. Intenta más tarde.';
        if (e.code === 'auth/network-request-failed') msg = 'Sin conexión. Verifica tu red.';
        if (e.code === 'auth/no-profile')         msg = 'Usuario sin perfil asignado. Contacta al administrador.';
        if (e.code === 'auth/unknown-role')       msg = 'Rol no reconocido. Contacta al administrador.';
        document.getElementById('errMsg').textContent = msg;
        document.getElementById('errMsg').classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Iniciar sesión';
      });
  }
</script>
</body>
</html>
